<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-dark" href="#">MyLibrary</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navMenu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero text-center py-5">
        <h1 class="fw-bold">Welcome to Digital Library 📚</h1>
        <p class="lead">Read, Learn, and Explore Knowledge</p>
        <button class="btn btn-light mt-3">Browse Books</button>
    </section>

    <!-- Cards Section -->
    <div class="row mt-5 g-4">

        <div class="col-md-4">
            <div class="card custom-card text-center p-4">
                <h4>📖 Fiction</h4>
                <p>Explore amazing stories and novels.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card text-center p-4">
                <h4>📘 Education</h4>
                <p>Study materials and academic books.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card text-center p-4">
                <h4>🌍 History</h4>
                <p>Learn about past events and civilizations.</p>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="text-center mt-5 py-4 border-top">
        <p class="text-muted">© 2026 Digital Library</p>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
